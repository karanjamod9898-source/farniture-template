<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 12px 20px;
            color: #fff;
            position: relative;
            z-index: 1000;
        }

        .brand a {
            color: #fff;
            font-size: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .nav-list {
            display: flex;
            gap: 20px;
            list-style: none;
            transition: right 0.3s ease;
            margin: 0;
            /* ✅ Extra space remove */
            padding: 0;
            /* ✅ Extra space remove */
        }

        .nav-list li {
            margin: 0;
            /* ✅ No default spacing */
            padding: 0;
        }

        .nav-list li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: block;
            padding: 8px 0;
        }

        .nav-list li a:hover {
            color: #ffd700;
        }

        .search-box {
            padding: 6px 10px;
            border: none;
            outline: none;
            border-radius: 4px;
        }

        .nav-toggle {
            display: none;
            cursor: pointer;
            font-size: 24px;
            background: none;
            border: none;
            color: white;
        }

        @media (max-width: 798px) {
            .nav-toggle {
                display: block;
            }

            .nav-list {
                position: fixed;
                top: 60px;
                right: -100%;
                background: #333;
                flex-direction: column;
                width: 70%;
                height: 100vh;
                padding: 10px 20px;
                /* ✅ Proper spacing only inside */
                transition: right 0.3s ease-in-out;
            }

            .nav-list.showing {
                right: 0;
            }

            .search-box {
                margin-top: 15px;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <header class="Header">
        <section class="navigation">
            <div class="nav-container">
                <div class="brand"><a href="#">Furniture</a></div>
                <button id="nav-toggle" class="nav-toggle">☰</button>
                <ul class="nav-list" id="mainListDiv">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Services</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
                <input type="text" id="searchBox" class="search-box" placeholder="Search...">
            </div>
        </section>
    </header>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const navToggle = document.getElementById("nav-toggle");
            const navList = document.getElementById("mainListDiv");
            const searchBox = document.getElementById("searchBox");
            const navContainer = document.querySelector(".nav-container");

            // Toggle Menu + Icon Change
            navToggle.addEventListener("click", () => {
                navToggle.classList.toggle("active");
                navList.classList.toggle("showing");
                navToggle.textContent = navToggle.classList.contains("active") ? "✖" : "☰";
            });

            // Handle Search Box Move
            function handleSearchBox() {
                if (!searchBox || !navList || !navContainer) return;
                const mobile = window.innerWidth <= 798;

                if (mobile && searchBox.parentElement !== navList) {
                    navList.appendChild(searchBox);
                }
                else if (!mobile && searchBox.parentElement !== navContainer) {
                    navContainer.appendChild(searchBox);
                }
            }

            window.addEventListener("resize", handleSearchBox);
            handleSearchBox();
        });
    </script>

</body>

</html>
